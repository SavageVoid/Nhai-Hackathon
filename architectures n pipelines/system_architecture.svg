<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
<style>.box{fill:#f8fbff;stroke:#1f5f99;stroke-width:2;rx:14}.title{font:700 28px Arial;fill:#123}.txt{font:18px Arial;fill:#123}.small{font:15px Arial;fill:#345}.arrow{stroke:#234;stroke-width:3;marker-end:url(#m)}</style>
<defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#234"/></marker></defs>
<text x="40" y="45" class="title">System Architecture - Offline Face Authentication</text>
<rect x="40" y="90" width="220" height="110" class="box"/><text x="70" y="130" class="txt">React Native UI</text><text x="70" y="160" class="small">Enrollment / Verify</text><text x="70" y="184" class="small">Benchmark HUD</text>
<rect x="330" y="90" width="260" height="110" class="box"/><text x="360" y="130" class="txt">Vision Camera</text><text x="360" y="160" class="small">720p preview</text><text x="360" y="184" class="small">JSI frame processors</text>
<rect x="660" y="70" width="420" height="160" class="box"/><text x="690" y="110" class="txt">On-device ML Pipeline</text><text x="690" y="140" class="small">Face detector + quality check</text><text x="690" y="164" class="small">Alignment + MobileFaceNet embedding</text><text x="690" y="188" class="small">MiniFASNet passive liveness</text><text x="690" y="212" class="small">Random active challenge if needed</text>
<rect x="180" y="310" width="290" height="140" class="box"/><text x="210" y="350" class="txt">Secure Local Storage</text><text x="210" y="380" class="small">SQLCipher / encrypted SQLite</text><text x="210" y="404" class="small">Embeddings + pending events</text><text x="210" y="428" class="small">Keystore / Keychain keys</text>
<rect x="560" y="310" width="280" height="140" class="box"/><text x="590" y="350" class="txt">Decision Engine</text><text x="590" y="380" class="small">Multi-frame voting</text><text x="590" y="404" class="small">Threshold calibration</text><text x="590" y="428" class="small">Attempt limiting</text>
<rect x="920" y="310" width="230" height="140" class="box"/><text x="950" y="350" class="txt">Sync Manager</text><text x="950" y="380" class="small">Batch upload</text><text x="950" y="404" class="small">HMAC + idempotency</text><text x="950" y="428" class="small">Purge after ACK</text>
<rect x="660" y="530" width="360" height="100" class="box"/><text x="690" y="570" class="txt">AWS Backend</text><text x="690" y="600" class="small">API Gateway + Lambda + DynamoDB/S3</text>
<line x1="260" y1="145" x2="330" y2="145" class="arrow"/><line x1="590" y1="145" x2="660" y2="145" class="arrow"/><line x1="870" y1="230" x2="715" y2="310" class="arrow"/><line x1="560" y1="380" x2="470" y2="380" class="arrow"/><line x1="840" y1="380" x2="920" y2="380" class="arrow"/><line x1="1035" y1="450" x2="900" y2="530" class="arrow"/>
</svg>